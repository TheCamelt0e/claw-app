name: Build CLAW Android APK

on:
  # Only build on version tags — NOT on every push
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'  # v1.0.0, v1.2.3-beta, etc.
  
  # Manual trigger with options
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build Profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: 'Platform'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all

# Prevent concurrent builds
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: 🏗️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: 🚀 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        working-directory: ./mobile
        run: npm ci

      - name: 🔍 Validate project
        working-directory: ./mobile
        run: npx expo doctor

      - name: 🏗️ Build with EAS
        working-directory: ./mobile
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          PLATFORM="${{ github.event.inputs.platform || 'android' }}"
          echo "Building profile: $PROFILE, platform: $PLATFORM"
          eas build --platform "$PLATFORM" --profile "$PROFILE" --non-interactive

      - name: 📱 Get Build Status
        if: success()
        run: |
          echo "✅ Build completed successfully!"
          echo "📲 Download APK from: https://expo.dev/accounts/camelt0e/projects/claw-app/builds"
          
      - name: 🔔 Notify on Failure
        if: failure()
        run: |
          echo "❌ Build failed!"
          echo "Check logs at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
